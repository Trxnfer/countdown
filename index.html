<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYC: The Trenches - Countdown</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="overlay"></div>

<div class="container">
    <h1 class="title">NYC: THE TRENCHES</h1>
    <p class="subtitle">Official Roblox Launch Countdown</p>

    <div class="countdown">
        <div class="box"><span id="days">00</span><label>Days</label></div>
        <div class="box"><span id="hours">00</span><label>Hours</label></div>
        <div class="box"><span id="minutes">00</span><label>Minutes</label></div>
        <div class="box"><span id="seconds">00</span><label>Seconds</label></div>
    </div>

    <a id="playBtn" class="button disabled" href="#">
        Coming Soon
    </a>
</div>

<script src="script.js"></script>
</body>
</html>
