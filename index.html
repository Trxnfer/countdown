<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYC: The Trenches</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="overlay"></div>

    <!-- BACKGROUND MUSIC -->
    <iframe id="bgMusic" 
            width="0" 
            height="0" 
            src="https://www.youtube.com/embed/6Z6-daOCLEU?autoplay=1&loop=1&playlist=6Z6-daOCLEU" 
            frameborder="0" 
            allow="autoplay">
    </iframe>

    <button id="musicBtn" onclick="toggleMusic()">🔊 MUSIC</button>

    <div class="container">
        <h1 class="title">NYC: THE TRENCHES</h1>
        <p class="subtitle">Presented to you by Trxnfer</p>
        
        <p class="releasing">RELEASING IN</p>
        
        <div class="countdown">
            <div class="box"><span id="days">00</span><label>DAYS</label></div>
            <div class="box"><span id="hours">00</span><label>HOURS</label></div>
            <div class="box"><span id="minutes">00</span><label>MINUTES</label></div>
            <div class="box"><span id="seconds">00</span><label>SECONDS</label></div>
        </div>

        <div class="buttons">
            <a href="https://discord.gg/hs2zg9nacF" target="_blank" class="btn discord">
                🔗 JOIN THE DISCORD
            </a>
            <button class="btn roblox">🎮 PLAY ON ROBLOX</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
